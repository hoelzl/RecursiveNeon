repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Local mypy hooks use the project venv (where all deps are installed).
  # Must cd into backend/ so mypy_path = "src" resolves correctly.
  # Two passes: native platform + Linux (CI platform) to catch cross-platform issues.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd backend && if [ -x ../.venv/Scripts/mypy.exe ]; then ../.venv/Scripts/mypy.exe; else ../.venv/bin/mypy; fi'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
      - id: mypy-linux
        name: mypy (linux)
        entry: bash -c 'cd backend && if [ -x ../.venv/Scripts/mypy.exe ]; then ../.venv/Scripts/mypy.exe --platform linux; else ../.venv/bin/mypy --platform linux; fi'
        language: system
        types: [python]
        files: ^backend/
        pass_filenames: false
